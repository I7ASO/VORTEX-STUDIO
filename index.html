<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX STUDIO | الأقسام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #a855f7; --bg: #0d0118; --c: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 30px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--p); box-shadow: 0 0 15px var(--p); }
        
        /* أزرار التنقل بين الأجهزة */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--c); border: 1px solid var(--p); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--p); box-shadow: 0 0 15px var(--p); }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: var(--c); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(168, 85, 247, 0.2); backdrop-filter: blur(5px); display: none; }
        .card.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { display: block; padding: 12px; margin-top: 10px; border-radius: 12px; text-decoration: none; font-weight: bold; color: #fff; transition: 0.3s; }
        .btn-dl { background: var(--p); }
        .btn-discord { background: #5865F2; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.postimg.cc/vmLMQq17/IMG-2992.png" class="logo-img">
        <h1 style="text-shadow: 0 0 10px var(--p);">VORTEX</h1>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openTab('ios')"><i class="fab fa-apple"></i> iOS</button>
        <button class="tab-btn" onclick="openTab('android')"><i class="fab fa-android"></i> Android</button>
        <button class="tab-btn" onclick="openTab('pc')"><i class="fas fa-laptop"></i> PC</button>
    </div>

    <div class="container">
        <div id="ios" class="card active">
            <h3>Delta Executor (iOS)</h3>
            <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="btn btn-dl">تثبيت مباشر</a>
        </div>

        <div id="android" class="card">
            <h3>Arceus X Neo</h3>
            <a href="https://www.mediafire.com/file/nli72kkxnkrh4g7/Roblox.-.Arceus.X.v5.1.4.2.apk/file" class="btn btn-dl">تحميل APK</a>
            <h3 style="margin-top:20px;">Codex</h3>
            <a href="https://www.mediafire.com/file/4cadggxj7k5vktx/Codex+v2.716.apk/file" class="btn btn-dl">تحميل APK</a>
        </div>

        <div id="pc" class="card">
            <h3>Xeno Executor</h3>
            <p style="font-size: 0.8rem; color: #aaa;">أقوى هاك للكمبيوتر حالياً</p>
            <a href="https://www.mediafire.com/file/2ge30y7r9ufi9gt/Xeno-v1.3.30.zip/file" class="btn btn-dl">تحميل للكمبيوتر</a>
        </div>

        <a href="https://discord.gg/ghJ3NcvsJs" class="btn btn-discord">انضم للديسكورد</a>
    </div>

    <script>
        function openTab(tabId) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
