<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX STUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #0d0118; 
            background-image: radial-gradient(circle at center, #1a0233 0%, #0d0118 100%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #a855f7;
            box-shadow: 0 0 20px #a855f7;
            object-fit: cover;
        }

        .logo-text {
            font-size: 2.8rem;
            font-weight: bold;
            color: #d8b4fe;
            text-shadow: 0 0 20px #a855f7;
            letter-spacing: 1px;
        }

        .maintenance-card {
            background: rgba(20, 1, 40, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 30px;
            padding: 40px;
            margin: 0 auto;
            max-width: 450px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .maintenance-icon {
            font-size: 3.5rem;
            color: #a855f7;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #a855f7;
        }

        .status-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .status-desc {
            color: #aaa;
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #5865F2;
            color: #fff;
            padding: 14px 28px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            transition: 0.3s;
        }

        .discord-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.6);
        }

        .copyright {
            position: absolute;
            bottom: 30px;
            width: 100%;
            color: #555;
            font-size: 0.85rem;
        }

        .github-link {
            color: #a855f7;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="logo-section">
            <img src="https://i.postimg.cc/hPz1NNw3/ACFF0642-2A46-488D-BB00-B244DA5DD65B.png" alt="Vortex Logo" class="logo-img">
            <div class="logo-text">VORTEX STUDIO</div>
        </div>

        <div class="maintenance-card">
            <i class="fas fa-tools maintenance-icon"></i>
            <h2 class="status-title">الموقع تحت الصيانة</h2>
            <p class="status-desc">
                نعمل حالياً على تحديث الروابط وإغلاق بعض الأخطاء التقنية لضمان حماية أفضل. سنعود قريباً بكل جديد!
            </p>
            
            <a href="https://discord.gg/ghJ3NcvsJs" class="discord-btn">
                <i class="fab fa-discord"></i> سيرفر الديسكورد
            </a>
        </div>

        <div class="copyright">
            <span class="github-link">i7aso.github.io</span> | جميع الحقوق محفوظة لـ <strong>VORTEX STUDIO</strong> © 2026
        </div>
    </div>

</body>
</html>
