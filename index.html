<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Vortex Studio | Download</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #05050a url('bg.jpg') no-repeat center center fixed; background-size: cover; color: #fff; text-align: center; }
        .v-card { background: rgba(0,0,0,0.7); border: 1px solid #8a2be2; border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); }
        .btn-v { background: #8a2be2; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 10px; text-decoration: none; display: block; margin-top: 10px; }
        .btn-v:hover { background: #bc13fe; }
        .code-box { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <img src="banner.png" class="img-fluid mb-4" style="max-height: 60px;">
        <div class="mb-4">
            <img src="logo.png" width="120" class="rounded-4 shadow-lg">
            <h1 class="mt-3">VORTEX STUDIO</h1>
        </div>

        <div class="row g-3 justify-content-center">
            <div class="col-md-4">
                <div class="v-card">
                    <h4>Android</h4>
                    <a href="delta.apk" class="btn-v">Download APK</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="v-card">
                    <h4>iPhone (iOS)</h4>
                    <a href="delta.ipa" class="btn-v">Download IPA</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="v-card">
                    <h4>Script Hub</h4>
                    <div class="code-box" id="scriptCode">loadstring(game:HttpGet("https://raw.githubusercontent.com/Vortex/main.lua"))()</div>
                    <button class="btn-v" onclick="copyScript()">Copy Script</button>
                </div>
            </div>
        </div>
    </div>

    <script src="inbox.js"></script>
</body>
</html>
