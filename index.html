<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX STUDIO | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #a855f7;
            --bg-dark: #0d0118;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a0233 0%, #0d0118 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* رأس الصفحة المطور */
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
            object-fit: cover;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #d8b4fe;
            text-shadow: 0 0 15px var(--primary-color);
            letter-spacing: 1px;
        }

        /* حاوية البطاقات */
        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-desc {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* الأزرار */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            margin: 10px 0;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-color);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        /* زر الديسكورد السفلي */
        .btn-discord {
            background: #5865F2;
            color: #fff;
            width: 100%;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        .footer-info {
            margin-top: 30px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://i.postimg.cc/vmLMQq17/IMG-2992.png" alt="Vortex" class="logo-img">
        <div class="logo-text">VORTEX</div>
    </div>

    <div class="container">
        
        <div class="card">
            <div class="card-title">
                <i class="fas fa-bolt" style="color: #ff0;"></i> DELTA EXECUTOR
            </div>
            <p class="card-desc">الإصدار الأحدث والأكثر أماناً، يدعم كافة السكربتات بدون كراش.</p>
            
            <a href="itms-services://?action=download-manifest&url=https://delta.bz/manifest.plist" class="btn btn-primary">
                <i class="fab fa-apple"></i> تثبيت مباشر (iOS)
            </a>
            <a href="https://www.mediafire.com/file/v6sogoz9kn9iduw/Delta-2.716.875.apk/file" class="btn btn-outline">
                <i class="fab fa-android"></i> تحميل للأندرويد (APK)
            </a>
        </div>

        <div class="card" style="border-color: #7e22ce;">
            <div class="card-title">
                <i class="fas fa-key-slash" style="color: #a855f7;"></i> SKIBX (NO KEY)
            </div>
            <p class="card-desc">هاك سريع جداً للأيفون ولا يتطلب مفتاح تشغيل.</p>
            
            <a href="itms-services://?action=download-manifest&url=https://www.installonair.com/storage/ipaz/pyzvF7/pyzvF7.plist" class="btn" style="background: #7e22ce; color: #fff;">
                <i class="fab fa-apple"></i> تثبيت مباشر (iOS)
            </a>
        </div>

        <a href="https://discord.gg/ghJ3NcvsJs" class="btn btn-discord">
            <i class="fab fa-discord"></i> انضم لسيرفر الديسكورد
        </a>

    </div>

    <div class="footer-info">
        i7aso.github.io | VORTEX STUDIO © 2026
    </div>

</body>
</html>
